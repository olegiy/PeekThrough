<svg width="256" height="256" viewBox="0 0 256 256" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Pixel Grid size approx 16x16 scaled up -->
  <defs>
    <style>
      .pixel { width: 16px; height: 16px; }
    </style>
  </defs>
  
  <!-- Banana Shape (Solid Top) -->
  <g fill="#facc15">
      <rect x="128" y="48" width="16" height="16" /> <!-- Stem -->
      <rect x="112" y="64" width="16" height="16" />
      <rect x="96" y="80" width="16" height="16" />
      <rect x="80" y="96" width="16" height="16" />
      <rect x="64" y="112" width="16" height="16" />
      <rect x="48" y="128" width="16" height="16" />
  </g>
  
  <!-- Banana Shape (Ghost/Transparent Bottom) -->
  <g fill="rgba(250, 204, 21, 0.4)">
      <rect x="48" y="144" width="16" height="16" />
      <rect x="64" y="160" width="16" height="16" />
      <rect x="80" y="176" width="16" height="16" />
      <rect x="96" y="192" width="16" height="16" />
      <rect x="112" y="192" width="16" height="16" />
      <rect x="128" y="192" width="16" height="16" />
      <rect x="144" y="176" width="16" height="16" />
      <rect x="160" y="160" width="16" height="16" />
  </g>
  
  <!-- Outline/Details -->
  <path d="M128 48 H144 V64 H128 V48" fill="#a16207" /> <!-- Stem Tip -->
  
  <!-- Pixel Border Effect (Simple dots) -->
  <rect x="144" y="48" width="16" height="16" fill="rgba(0,0,0,0.1)" />
</svg>